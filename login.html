<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Blossom & Blue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Delius&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           GLOBAL STRUCTURE & BACKDROP CANVAS
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', 'Segoe UI', serif;
        }

        body {
            background: linear-gradient(135deg, rgba(255,236,210,0.8) 0%, rgba(252,182,159,0.8) 50%, rgba(219,182,216,0.8) 100%),
                        url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4xNCI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            color: #2D1B3F;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ==========================================================================
           STICKY HEADER NAVIGATION
           ========================================================================== */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid rgba(255, 111, 97, 0.3);
            box-shadow: 0 4px 20px rgba(45, 27, 63, 0.05);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            position: relative;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 110;
            text-decoration: none;
        }

        .logo-icon {
            background: linear-gradient(135deg, #9B5DE5, #FF6F61);
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Delius', cursive;
            font-size: 22px;
            font-weight: 800;
            color: #2D1B3F;
            letter-spacing: 1px;
        }

        .logo-text span { color: #FF6F61; }
        .menu-checkbox { display: none; }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 110;
            padding: 5px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background-color: #FF6F61;
            border-radius: 3px;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex: 1;
            margin-left: 30px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            font-weight: 600;
            color: #5A416D;
            transition: color 0.2s;
            padding: 10px 4px;
            font-size: 16px;
            text-decoration: none;
        }

        .nav-links a:hover { color: #9B5DE5; }

        .nav-customize-btn {
            background: rgba(255, 111, 97, 0.08);
            border: 1px dashed #FF6F61;
            color: #FF6F61 !important;
            padding: 8px 18px !important;
            border-radius: 20px;
            font-weight: 600 !important;
            font-size: 16px !important;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: all 0.3s ease !important;
        }

        .nav-customize-btn:hover {
            background: linear-gradient(135deg, #9B5DE5, #FF6F61) !important;
            border-color: transparent;
            color: #FFF !important;
        }

        .nav-utilities { display: flex; align-items: center; gap: 15px; }

        .cart-btn {
            background: #9B5DE5;
            color: #FFFFFF;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #FF6F61;
            color: white;
            font-size: 11px;
            font-weight: bold;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #FFFFFF;
        }

        /* ==========================================================================
           AUTHENTICATION FORM PANEL
           ========================================================================== */
        .auth-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(155, 93, 229, 0.15);
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(45, 27, 63, 0.05);
        }

        .auth-card h1 {
            font-size: 28px;
            color: #2D1B3F;
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: #5A416D;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .form-control-wrapper {
            margin-bottom: 22px;
        }

        .form-control-wrapper label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #5A416D;
            margin-bottom: 8px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            color: rgba(155, 93, 229, 0.6);
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(155, 93, 229, 0.25);
            border-radius: 12px;
            font-size: 15px;
            color: #2D1B3F;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: #9B5DE5;
            box-shadow: 0 0 0 3px rgba(155, 93, 229, 0.12);
        }

        .form-options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #5A416D;
            cursor: pointer;
        }

        .remember-me-checkbox input {
            accent-color: #9B5DE5;
        }

        .forgot-password-link {
            color: #FF6F61;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .forgot-password-link:hover {
            color: #9B5DE5;
        }

        .auth-submit-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #9B5DE5, #FF6F61);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 111, 97, 0.2);
            transition: transform 0.2s;
            margin-bottom: 25px;
        }

        .auth-submit-btn:hover {
            transform: translateY(-2px);
        }

        .auth-footer-text {
            text-align: center;
            font-size: 15px;
            color: #5A416D;
        }

        .auth-footer-text a {
            color: #9B5DE5;
            text-decoration: none;
            font-weight: 700;
        }

        .auth-footer-text a:hover {
            text-decoration: underline;
        }

        /* ==========================================================================
           FOOTER & RESPONSIVE MEDIA BREAKPOINTS
           ========================================================================== */
        footer {
            background-color: #2D1B3F;
            color: #FFFFFF;
            padding: 30px 0;
            text-align: center;
            font-size: 14px;
            border-top: 5px solid #FF6F61;
            margin-top: auto;
        }

        @media (max-width: 868px) {
            .menu-toggle { display: flex; }
            .nav-menu {
                position: absolute;
                top: 100%;
                left: -100%;
                width: 100%;
                height: calc(100vh - 64px);
                background-color: #2D1B3F;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                gap: 35px;
                padding: 55px 0;
                margin-left: 0;
                transition: left 0.4s cubic-bezier(0.77, 0.2, 0.05, 1.0);
            }
            .nav-links { flex-direction: column; gap: 25px; }
            .nav-links a { color: #FFFFFF; }
            .nav-customize-btn { width: 80%; justify-content: center; }
            .menu-checkbox:checked ~ .nav-menu { left: 0; }
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo-wrapper">
                <div class="logo-icon"><i class="fa-solid fa-seedling"></i></div>
                <div class="logo-text">Blossom<span>& Blue</span></div>
            </a>
            
            <input type="checkbox" id="menu-bar" class="menu-checkbox">
            <label for="menu-bar" class="menu-toggle">
                <span></span><span></span><span></span>
            </label>

            <nav class="nav-menu">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="bouquets.html">Bouquets</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                    <li><a href="#" class="nav-customize-btn"><i class="fa-solid fa-wand-magic-sparkles"></i> Customize</a></li>
                </ul>
                <div class="nav-utilities">
                    <a href="addcart.html" class="cart-btn">
                        <i class="fa-solid fa-shopping-bag"></i>
                        <span class="cart-badge" id="global-cart-count">0</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="auth-wrapper container">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Log in to manage your premium botanical orders</p>
            
            <form onsubmit="alert('Login demo complete!'); return false;">
                <div class="form-control-wrapper">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" class="form-input" required placeholder="name@example.com">
                    </div>
                </div>

                <div class="form-control-wrapper">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" class="form-input" required placeholder="••••••••">
                    </div>
                </div>

                <div class="form-options-row">
                    <label class="remember-me-checkbox">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password-link" onclick="alert('Password recovery configuration module triggered.');">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-submit-btn">Log In</button>
            </form>

            <div class="auth-footer-text">
                Don't have an account? <a href="signup.html">Create Account</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Blossom & Blue Studio. Crafted beautifully for unforgettable moments.</p>
        </div>
    </footer>

    <script>
        function updateNavbarCartBadge() {
            const badgeElement = document.getElementById('global-cart-count');
            if (!badgeElement) return;

            let cartData = localStorage.getItem('cart') || localStorage.getItem('cartItems');
            let count = 0;

            if (cartData && cartData !== '[]' && cartData !== '""' && cartData !== 'null' && cartData !== 'undefined') {
                try {
                    const parsed = JSON.parse(cartData);
                    if (Array.isArray(parsed)) {
                        if (parsed.length === 0) {
                            count = 0;
                        } else {
                            count = parsed.reduce((total, item) => total + (parseInt(item.quantity, 10) || 1), 0);
                        }
                    } else if (typeof parsed === 'number') {
                        count = parsed;
                    } else if (typeof parsed === 'object' && parsed !== null) {
                        count = parseInt(parsed.quantity, 10) || 1;
                    }
                } catch(e) {
                    const directNum = parseInt(cartData, 10);
                    count = !isNaN(directNum) ? directNum : 0;
                }
            }

            if (count <= 0) {
                badgeElement.style.display = 'none';
                badgeElement.textContent = '0';
            } else {
                badgeElement.style.display = 'flex';
                badgeElement.textContent = count;
            }
        }
        document.addEventListener('DOMContentLoaded', updateNavbarCartBadge);
    </script>
</body>
</html>
