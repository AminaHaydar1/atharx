<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Studio Account | Athar Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: #0b0813; color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
            background-image: radial-gradient(circle at 90% 10%, rgba(168, 85, 247, 0.12) 0%, transparent 50%);
        }
        .signup-container { background: rgba(15, 12, 28, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 16px; width: 100%; max-width: 450px; padding: 40px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
        .signup-header { text-align: center; margin-bottom: 30px; }
        .signup-header h1 span { color: #a855f7; text-shadow: 0 0 10px rgba(168, 85, 247, 0.3); }
        .alert-box { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 20px; display: none; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 10px; text-transform: uppercase; color: #64748b; letter-spacing: 0.8px; margin-bottom: 6px; font-weight: 700; }
        .form-control { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 12px 16px; color: #ffffff; font-size: 14px; }
        .form-control:focus { border-color: #a855f7; outline: none; }
        .btn-signup { background: linear-gradient(to right, #a855f7, #3b82f6); color: #ffffff; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; }
       p redirect {
    color: #94a3b8; /* Subtle text color */
    font-size: 14px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    text-align: center;
    margin-top: 20px;
    background: none; /* Explicitly removes any structural box backgrounds */
    border: none;     /* Explicitly removes lines or borders */
      /* Removes internal spacing */
}

p  a {
    color: #a855f7; /* Vibrant accent color for the link */
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s ease, text-shadow 0.2s ease;
}

p a:hover {
    color: #3b82f6; /* Switches cleanly on hover */
    text-shadow: 0 0 8px rgba(59, 130, 246, 0.4); /* Subtle ambient glow */
}
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="signup-header">
            <h1>Studio Hub <span>Register</span></h1>
            <p style="color: #94a3b8; font-size: 14px; margin-top: 5px;">Create your production workspace profile</p>
        </div>

        <div id="errorAlert" class="alert-box"></div>

        <form action="signup.php" method="POST">
            <div class="form-group">
                <label>Full Name Identity</label>
                <input type="text" name="full_name" class="form-control" placeholder="e.g. Athar Designer" required>
            </div>
            
            <div class="form-group">
                <label>Workspace Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="designer@studio.com" required>
            </div>

            <div class="form-group">
                <label>Contact Phone Line (Optional)</label>
                <input type="tel" name="phone_number" class="form-control" placeholder="e.g. +961 70 123 456">
            </div>

            <div class="form-group">
                <label>Security Access Key</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-signup">Generate Account Profile</button>
            <br>
            <br>
            <p> already have a account? <a href="login.html">login</a></p>
        </form>
    </div>

    <script>
        // Catches errors passed from PHP via the URL query string
        const urlParams = new URLSearchParams(window.location.search);
        const errorParam = urlParams.get('error');
        if (errorParam) {
            const alertBox = document.getElementById('errorAlert');
            alertBox.style.display = 'block';
            if (errorParam === 'empty_fields') alertBox.innerText = 'Required fields missing.';
            else if (errorParam === 'credential_taken') alertBox.innerText = 'This name or email is already registered.';
            else alertBox.innerText = 'Registration failed. Check database details.';
        }
    </script>
</body>
</html>
