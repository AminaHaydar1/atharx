    <script>
        function previewUserProfilePicture(inputElement) {
            const previewBox = document.getElementById('avatar-preview-box');
            
            if (inputElement.files && inputElement.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    previewBox.innerHTML = `<img src="${e.target.result}" alt="Profile Avatar Preview">`;
                };
                
                reader.readAsDataURL(inputElement.files[0]);
            }
        }
    </script>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Stop native HTML page reload
            
            const form = event.target;
            const submitBtn = document.getElementById('submitBtn');
            const statusBanner = document.getElementById('status-banner');
            
            // Collect both text entries and binary images dynamically 
            const formData = new FormData(form);
            
            // UI Visual Feedback Updates
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering Account...';
            statusBanner.style.display = 'none';
            statusBanner.className = 'message-banner';

            // Send payload async to signup.php using the fetch stream parameters
            fetch('signup.php', {
                method: 'POST',
                body: formData
            })
            .then(async response => {
                const data = await response.json();
                if (!response.ok) {
                    // Throw structural payload messages received from PHP
                    throw new Error(data.message || 'Server returned an invalid configuration.');
                }
                return data;
            })
            .then(data => {
                // Success feedback pipeline route 
                statusBanner.textContent = data.message;
                statusBanner.classList.add('success');
                statusBanner.style.display = 'block';
                
                // Clear out current fields
                form.reset();
                document.getElementById('avatar-preview-box').innerHTML = '<i class="fa-regular fa-user"></i>';

                // Redirect user to home or shop dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = 'index.html'; 
                }, 2000);
            })
            .catch(error => {
                // Display registration exception states directly onto form interface card
                statusBanner.textContent = error.message;
                statusBanner.classList.add('error');
                statusBanner.style.display = 'block';
                
                // Reset submit state
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            });
        });
    </script>

   <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const form = e.target;
        const submitBtn = document.getElementById('submitBtn');
        const errorBanner = document.getElementById('errorBanner');
        const successBanner = document.getElementById('successBanner');
        
        // Form field data capture matches your inputs
        const userid = document.getElementById('userid').value.trim();
        const fname = document.getElementById('fname').value.trim();
        const lname = document.getElementById('lname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        errorBanner.style.display = "none";
        successBanner.style.display = "none";
        submitBtn.value = "Registering Account...";
        submitBtn.disabled = true;

        // Basic verification checks
        if (!userid || !fname || !lname || !email || !password) {
            errorBanner.textContent = "All registration form metrics must be filled out completely.";
            errorBanner.style.display = "block";
            submitBtn.value = "Sign Up";
            submitBtn.disabled = false;
            return;
        }

        // Pull existing users from Browser Local Data Bank
        let localUsers = JSON.parse(localStorage.getItem('studio_users')) || [];
        
        // Look for existing duplicates
        const userExists = localUsers.some(u => u.userid === userid || u.email === email);
        if (userExists) {
            setTimeout(() => {
                errorBanner.textContent = "This User ID or Email configuration is already assigned to a profile.";
                errorBanner.style.display = "block";
                submitBtn.value = "Sign Up";
                submitBtn.disabled = false;
            }, 800);
            return;
        }

        // Add user profile to array list
        localUsers.push({ userid, fname, lname, email, password });
        localStorage.setItem('studio_users', JSON.stringify(localUsers));

        // Display confirmation 
        setTimeout(() => {
            successBanner.textContent = "Welcome to Blossom & Blue Studio! Routing to login...";
            successBanner.style.display = "block";
            form.reset();
            
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);
        }, 1200);
    });
</script>
